version: "3.9"

# ============================================================
# 古代瓮听声学共振与声源定位仿真系统 - Docker Compose 编排
# 服务:
#   1. clickhouse  - 时序数据存储 (原生 TCP 8123 / 9000)
#   2. mosquitto   - MQTT Broker (1883 / 9001 ws)
#   3. backend     - Rust 后端服务 (HTTP 8080 + WebSocket + /metrics)
#   4. simulator   - 瓮听传感器模拟器 (Python, 可配置声源/介质)
# ============================================================

x-defaults: &defaults
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "5"

services:

  # ---------- ClickHouse: 声学数据时序存储 ----------
  clickhouse:
    <<: *defaults
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: urn-clickhouse
    hostname: clickhouse
    ports:
      - "8123:8123"   # HTTP 接口
      - "9000:9000"   # Native TCP 接口
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./docker/clickhouse/config.xml:/etc/clickhouse-server/config.d/custom.xml:ro
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: urn_acoustics
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8123/?query=SELECT%201 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - urn-net

  # ---------- Mosquitto: MQTT Broker ----------
  mosquitto:
    <<: *defaults
    image: eclipse-mosquitto:2.0.18
    container_name: urn-mosquitto
    hostname: mosquitto
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # MQTT over WebSocket
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/broker/version' -C 1 -W 3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - urn-net

  # ---------- Rust 后端服务 ----------
  backend:
    <<: *defaults
    build:
      context: .
      dockerfile: ./docker/backend.Dockerfile
    image: urn-acoustics-backend:latest
    container_name: urn-backend
    hostname: backend
    depends_on:
      clickhouse:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    ports:
      - "8080:8080"   # HTTP + WebSocket + /metrics
    environment:
      # 应用配置覆盖 (JSON 配置文件中同名字段优先级低)
      URN_CONFIG_DIR: /app/config
      RUST_LOG: "urn_acoustics_backend=info,tower_http=info,axum=info,clickhouse=warn"
      URN_SERVER__HOST: "0.0.0.0"
      URN_SERVER__PORT: "8080"
      URN_SERVER__STATIC_DIR: "/app/static"
      URN_CLICKHOUSE__URL: "tcp://clickhouse:9000"
      URN_CLICKHOUSE__DATABASE: "urn_acoustics"
      URN_CLICKHOUSE__USER: "default"
      URN_CLICKHOUSE__PASSWORD: ""
      URN_MQTT__BROKER: "mosquitto"
      URN_MQTT__PORT: "1883"
      URN_MQTT__TOPIC: "urn/sensors/#"
      URN_MQTT__CLIENT_ID: "urn-backend-docker"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - urn-net

  # ---------- 瓮听传感器模拟器 ----------
  simulator:
    <<: *defaults
    build:
      context: .
      dockerfile: ./docker/simulator.Dockerfile
    image: urn-sensor-simulator:latest
    container_name: urn-simulator
    hostname: simulator
    depends_on:
      mosquitto:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      # 可通过 docker compose up -e 或 .env 覆盖
      MQTT_BROKER: "mosquitto"
      MQTT_PORT: "1883"
      MQTT_TOPIC_PREFIX: "urn/sensors"
      SIM_MEDIUM: "wet_sand"           # dry_sand / wet_sand / clay / limestone / granite
      SIM_SOURCE_DISTANCE: "120"        # 若设为空则用 SIM_SOURCE_X / Y
      SIM_SOURCE_X: "100"
      SIM_SOURCE_Y: "0"
      SIM_SOURCE_Z: "-2"
      SIM_STRENGTH_DB: "140"
      SIM_FREQUENCY: "220"
      SIM_INTERVAL: "1.0"
      SIM_DRIFT: "0"                     # >5% 会触发告警
      SIM_NOISE: "2.0"
    profiles:
      - simulator
    command: []   # 可通过 command: ["--medium", "limestone"] 覆盖
    networks:
      - urn-net

  # ---------- (可选) Prometheus: 指标抓取 ----------
  prometheus:
    <<: *defaults
    image: prom/prometheus:v2.52.0
    container_name: urn-prometheus
    hostname: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --web.enable-lifecycle
    profiles:
      - monitoring
    networks:
      - urn-net

volumes:
  clickhouse_data:
  mosquitto_data:
  mosquitto_log:
  prometheus_data:

networks:
  urn-net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16

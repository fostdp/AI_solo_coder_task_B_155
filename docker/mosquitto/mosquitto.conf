# ============================================================
# Eclipse Mosquitto 2.x 配置 - 瓮听声学系统
# ============================================================

# 监听端口: 标准 MQTT (非加密)
listener 1883 0.0.0.0
protocol mqtt

# 监听端口: MQTT over WebSocket (用于浏览器)
listener 9001 0.0.0.0
protocol websockets

# 允许匿名连接 (开发环境, 生产环境请加密码)
allow_anonymous true

# 持久化
persistence true
persistence_location /mosquitto/data/

# 日志
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# 最大连接数
max_connections -1

# 队列上限
max_inflight_bytes 0
max_queued_messages 10000

# 客户端 keepalive
keepalive_interval 60

# 桥接配置 (若需多数据中心可添加)
# connection dc-bridge
# address remote-broker:1883
# topic urn/sensors/# both 0
